<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#020617">
    <title>StudioLog | Teacher Attendance</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3254/3254068.png">
    
    <!-- Tailwind CSS (via CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        studio: {
                            950: '#020617',
                            900: '#0f172a',
                            800: '#1e293b',
                            700: '#334155',
                            600: '#475569',
                            accent: '#6366f1',
                            accentHover: '#4f46e5',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Premium Iconography) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-studio-950 text-gray-200 font-sans min-h-screen selection:bg-indigo-500/30 selection:text-indigo-200 pb-12 antialiased bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMSIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjAyKSIvPjwvc3ZnPg==')]">
    
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in">
        
        <!-- Header Section -->
        <header class="flex flex-col sm:flex-row justify-between items-center mb-8 pb-6 border-b border-gray-800/60 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/20 relative group cursor-pointer overflow-hidden">
                    <div class="absolute inset-0 bg-white/20 group-hover:opacity-100 opacity-0 transition-opacity"></div>
                    <i class="ph ph-waveform text-white text-2xl relative z-10"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">Studio<span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">Log</span></h1>
                    <p class="text-xs text-gray-400 font-semibold tracking-widest uppercase mt-0.5">Teacher Attendance</p>
                </div>
            </div>
            <div class="flex items-center gap-6 glass-panel px-5 py-2.5 rounded-xl">
                <div class="text-right border-r border-gray-700 pr-5">
                    <div id="current-time" class="text-xl font-bold text-gray-100 tracking-tight">--:--:--</div>
                </div>
                <div class="text-left">
                    <div id="current-day" class="text-sm font-medium text-gray-300">---</div>
                    <div id="current-date" class="text-xs text-gray-500 uppercase tracking-wider">---</div>
                </div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Sidebar (Forms) -->
            <div class="lg:col-span-4 space-y-6 animate-slide-up">
                
                <!-- Log Session Card -->
                <div class="glass-panel rounded-2xl p-6 shadow-xl relative overflow-hidden border border-gray-800/50">
                    <!-- Decorative Icon -->
                    <div class="absolute -top-4 -right-4 p-4 opacity-5 pointer-events-none transform rotate-12">
                        <i class="ph-fill ph-clock-user text-8xl text-indigo-400"></i>
                    </div>
                    
                    <h2 class="text-lg font-semibold text-white mb-6 flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-indigo-500/10 flex items-center justify-center border border-indigo-500/20">
                            <i class="ph-bold ph-plus text-indigo-400"></i>
                        </div>
                        New Session Log
                    </h2>
                    
                    <form id="log-form" class="space-y-5 relative z-10">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1.5 ml-1">Select Teacher</label>
                            <div class="relative">
                                <select id="teacher-select" required class="w-full bg-studio-900/50 border border-gray-700/60 text-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all appearance-none cursor-pointer">
                                    <option value="" disabled selected>Choose a teacher...</option>
                                    <!-- Options populated by JS -->
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-gray-500">
                                    <i class="ph-bold ph-caret-down"></i>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-1.5 ml-1">Session Date</label>
                            <input type="date" id="log-date" required class="w-full bg-studio-900/50 border border-gray-700/60 text-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all custom-date-input cursor-pointer">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <div class="flex justify-between items-end mb-1.5 ml-1">
                                    <label class="block text-sm font-medium text-gray-400">Start Time</label>
                                    <button type="button" id="btn-start-now" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium px-2 py-0.5 rounded bg-indigo-500/10 hover:bg-indigo-500/20 transition-colors">Now</button>
                                </div>
                                <input type="time" id="start-time" required class="w-full bg-studio-900/50 border border-gray-700/60 text-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all custom-time-input cursor-pointer">
                            </div>
                            <div>
                                <div class="flex justify-between items-end mb-1.5 ml-1">
                                    <label class="block text-sm font-medium text-gray-400">End Time</label>
                                    <button type="button" id="btn-end-now" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium px-2 py-0.5 rounded bg-indigo-500/10 hover:bg-indigo-500/20 transition-colors">Now</button>
                                </div>
                                <input type="time" id="end-time" required class="w-full bg-studio-900/50 border border-gray-700/60 text-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all custom-time-input cursor-pointer">
                            </div>
                        </div>
                        
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl px-4 py-3.5 mt-2 transition-all flex items-center justify-center gap-2 group shadow-lg shadow-indigo-600/20 active:scale-[0.98]">
                            <i class="ph-bold ph-floppy-disk group-hover:-translate-y-0.5 transition-transform"></i> Save Log Entry
                        </button>
                    </form>
                </div>

                <!-- Add Teacher Card -->
                <div class="glass-panel rounded-2xl p-6 shadow-xl border border-gray-800/50">
                    <h2 class="text-lg font-semibold text-white mb-5 flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-purple-500/10 flex items-center justify-center border border-purple-500/20">
                            <i class="ph-bold ph-user-plus text-purple-400"></i>
                        </div>
                        Register Teacher
                    </h2>
                    <form id="teacher-form" class="space-y-4">
                        <div>
                            <input type="text" id="teacher-name" required placeholder="Enter full name" class="w-full bg-studio-900/50 border border-gray-700/60 text-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all placeholder-gray-600">
                        </div>
                        <button type="submit" class="w-full bg-studio-800 hover:bg-studio-700 border border-gray-700 text-white font-medium rounded-xl px-4 py-3 transition-colors flex items-center justify-center gap-2 group">
                            <i class="ph-bold ph-plus group-hover:scale-110 transition-transform"></i> Add Teacher
                        </button>
                    </form>
                </div>
                
            </div>

            <!-- Right Content (Table) -->
            <div class="lg:col-span-8 animate-slide-up" style="animation-delay: 0.1s;">
                <div class="glass-panel rounded-2xl shadow-xl h-full flex flex-col border border-gray-800/50 overflow-hidden">
                    <div class="p-6 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border-b border-gray-800/50 bg-studio-900/20">
                        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                            <div class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center border border-emerald-500/20">
                                <i class="ph-bold ph-list-dashes text-emerald-400"></i>
                            </div>
                            Session History
                        </h2>
                        <div class="flex flex-wrap items-center gap-3">
                            <!-- Teacher Filter Dropdown -->
                            <div class="relative">
                                <select id="filter-teacher" class="bg-studio-900/80 border border-gray-700/50 text-gray-300 text-xs font-medium rounded-lg px-3 py-1.5 pr-8 focus:outline-none focus:border-emerald-500/50 appearance-none cursor-pointer">
                                    <option value="all">All Teachers</option>
                                    <!-- Options populated by JS -->
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-2 pointer-events-none text-gray-500">
                                    <i class="ph-bold ph-caret-down text-xs"></i>
                                </div>
                            </div>
                            
                            <!-- Summary Badges (Hidden by default, shown when teacher selected) -->
                            <div id="teacher-summary" class="hidden items-center gap-2">
                                <div class="text-xs font-medium text-gray-400 bg-studio-900/80 px-3 py-1.5 rounded-lg border border-gray-700/50 flex items-center gap-1.5">
                                    <i class="ph-fill ph-calendar-blank text-indigo-400"></i>
                                    <span id="summary-days" class="text-white">0</span> Days
                                </div>
                                <div class="text-xs font-medium text-gray-400 bg-studio-900/80 px-3 py-1.5 rounded-lg border border-gray-700/50 flex items-center gap-1.5">
                                    <i class="ph-fill ph-clock text-purple-400"></i>
                                    <span id="summary-hours" class="text-white">0h 0m</span>
                                </div>
                            </div>

                            <div class="text-xs font-medium text-gray-400 bg-studio-900/80 px-3 py-1.5 rounded-lg border border-gray-700/50 flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                <span id="total-logs" class="text-white">0</span> Records
                            </div>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto flex-1 custom-scrollbar relative">
                        <table class="w-full text-left text-sm whitespace-nowrap min-w-[600px]">
                            <thead class="bg-studio-900/90 text-gray-400 font-medium sticky top-0 backdrop-blur-md z-10 border-b border-gray-700/50 shadow-sm">
                                <tr>
                                    <th class="px-6 py-4 uppercase tracking-wider text-xs">Date</th>
                                    <th class="px-6 py-4 uppercase tracking-wider text-xs">Teacher Name</th>
                                    <th class="px-6 py-4 uppercase tracking-wider text-xs">Session Time</th>
                                    <th class="px-6 py-4 uppercase tracking-wider text-xs">Duration</th>
                                    <th class="px-6 py-4 uppercase tracking-wider text-xs text-right">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="logs-table-body" class="divide-y divide-gray-800/50 text-gray-300">
                                <!-- Table rows generated by JS -->
                            </tbody>
                        </table>
                        
                        <!-- Empty State -->
                        <div id="empty-state" class="hidden absolute inset-0 flex-col items-center justify-center py-20 text-center bg-studio-900/20">
                            <div class="w-20 h-20 bg-studio-900 rounded-full flex items-center justify-center mb-5 border border-gray-800 shadow-inner">
                                <i class="ph-thin ph-calendar-blank text-4xl text-gray-600"></i>
                            </div>
                            <h3 class="text-gray-300 font-medium text-lg mb-1">No sessions logged yet</h3>
                            <p class="text-gray-500 text-sm max-w-xs mx-auto">Start by adding a teacher and logging their first session to see data here.</p>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('ServiceWorker registered'))
                    .catch(error => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>
</html>
